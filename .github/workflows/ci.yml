name: Runtime Safety Kernels CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Primary quality-gates path
        id: quality_primary
        continue-on-error: true
        run: |
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 4 --timeout 300 -- lake update
          python scripts/check_proof_completeness.py
          python scripts/check_contract_consistency.py
          python scripts/lake_resilient.py --attempts 3 --timeout 600 -- lake build
      - name: Fallback quality-gates path
        if: steps.quality_primary.outcome == 'failure'
        run: |
          echo "Primary quality path failed; running fallback path."
          python scripts/lake_doctor.py
          python scripts/check_proof_completeness.py
          python scripts/check_contract_consistency.py
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake build
      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lake-diagnostics-${{ github.job }}-${{ github.run_id }}
          path: build/lake-diagnostics.json

  test:
    needs: [quality-gates]
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Primary test path
        id: test_primary
        continue-on-error: true
        run: |
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 4 --timeout 300 -- lake update
          python scripts/lake_resilient.py --attempts 3 --timeout 600 -- lake build
          python scripts/lake_resilient.py --attempts 2 --timeout 900 -- python scripts/run_runtime_checks.py all
      - name: Fallback test path
        if: steps.test_primary.outcome == 'failure'
        run: |
          echo "Primary test path failed; running fallback path."
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake build
          python scripts/lake_resilient.py --attempts 1 --timeout 900 -- python scripts/run_runtime_checks.py tests
      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lake-diagnostics-${{ github.job }}-${{ matrix.os }}-${{ github.run_id }}
          path: build/lake-diagnostics.json

  performance-regression:
    needs: [quality-gates]
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Performance regression checks
        run: |
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 4 --timeout 300 -- lake update
          python scripts/lake_resilient.py --attempts 3 --timeout 600 -- lake build
          python scripts/lake_resilient.py --attempts 2 --timeout 900 -- lake exe benchmarks --performance
          python scripts/lake_resilient.py --attempts 2 --timeout 900 -- python scripts/run_runtime_checks.py benchmarks

  fuzz-extended:
    needs: [quality-gates]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Extended fuzzing
        run: |
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 4 --timeout 300 -- lake update
          python scripts/lake_resilient.py --attempts 3 --timeout 600 -- lake build
          python scripts/lake_resilient.py --attempts 2 --timeout 1200 -- lake exe fuzz --extended
        timeout-minutes: 480

  security-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: cpp, python
      - uses: github/codeql-action/analyze@v3

  build-artifacts:
    needs: [test]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Build artifacts
        run: |
          python scripts/lake_doctor.py
          python scripts/lake_resilient.py --attempts 4 --timeout 300 -- lake update
          python scripts/lake_resilient.py --attempts 3 --timeout 600 -- lake build
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake exe sampler_c
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake exe policy_c
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake exe tensor_c
          python scripts/lake_resilient.py --attempts 2 --timeout 600 -- lake exe concurrency_rust
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-safety-kernels-${{ github.sha }}
          path: src/extracted
          retention-days: 30

  release:
    needs: [quality-gates, test]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: runtime-safety-kernels-${{ github.sha }}
      - uses: softprops/action-gh-release@v2
        with:
          files: src/extracted/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
